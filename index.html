<html>

<head>
    <meta http-equiv="Content-Language" content="zh-tw">
    <meta charset="UTF-8">
    <title>Freeman</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <style>
        /* 設定時間顯示的樣式 */
        /* 設定時間顯示的樣式 */
        #current-time {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #d580ff, 0 0 20px #b026ff, 0 0 40px #b026ff, 0 0 80px #8a2be2;
            text-align: center;
            font-family: "Century Gothic", "Apple Gothic", "Copperplate", "Meiryo", sans-serif;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 20px;
        }

        /* 新增動畫設定 */
        .bouncing-container {
            position: fixed;
            bottom: 25px;
            left: 0;
            width: 100%;
            text-align: center;
            overflow: hidden;
        }

        .bouncing-text {
            font-size: 1.2em;
            display: inline-block;
            white-space: nowrap;
            animation: bounce 6s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            0% {
                transform: translateX(-40vw);
            }

            100% {
                transform: translateX(40vw);
            }
        }

        /* 遊戲連結區塊樣式 */
        .game-links {
            text-align: center;
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 45px;
            perspective: 1000px;
        }

        .game-links a {
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .game-label {
            color: #d580ff;
            font-size: 1rem;
            font-weight: bold;
            text-shadow: 0 0 5px #b026ff;
            transition: all 0.3s ease;
        }

        .game-links a:hover .game-label {
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #b026ff;
            transform: translateY(-8px);
        }

        .game-links img {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .game-links a:hover img {
            transform: translateY(-15px) scale(1.1) rotate(2deg);
            box-shadow: 0 15px 30px rgba(176, 38, 255, 0.6), 0 0 15px rgba(255, 255, 255, 0.3);
            border-color: #d580ff;
        }

        .game-links a:active img {
            transform: scale(0.95);
        }

        /* 霓虹閃爍分隔線 */
        .neon-divider {
            width: 800px;
            height: 2px;
            margin: 40px auto;
            background: #fff;
            box-shadow:
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #b026ff,
                0 0 82px #b026ff,
                0 0 92px #b026ff,
                0 0 102px #b026ff,
                0 0 151px #b026ff;
            animation: flicker 1.5s infinite alternate;
            border-radius: 5px;
        }

        @keyframes flicker {

            0%,
            18%,
            22%,
            25%,
            53%,
            57%,
            100% {
                text-shadow:
                    0 0 4px #fff,
                    0 0 11px #fff,
                    0 0 19px #fff,
                    0 0 40px #b026ff,
                    0 0 80px #b026ff,
                    0 0 90px #b026ff,
                    0 0 100px #b026ff,
                    0 0 150px #b026ff;
                opacity: 1;
            }

            20%,
            24%,
            55% {
                text-shadow: none;
                opacity: 0.5;
            }
        }

        /* 工具連結專屬樣式 (位於日期下方) */
        .tool-links {
            margin-top: 25px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body bgcolor="#000000" background="background.jpg" style="background-attachment: fixed">

    <p align="center">
        <br>
        <br>
        <br>
        <br>

    <!-- 顯示日期與時間的區域 -->

    <!-- 新增工具連結區域 (日期下方) -->

    <div class="bouncing-container"><b>
            <font color="#00FFFF">
                <div class="bouncing-text">Under Construction</div>
            </font>
        </b></div>

    <script>
        function updateClock() {
            var now = new Date();
            var year = now.getFullYear();
            var month = String(now.getMonth() + 1).padStart(2, '0');
            var day = String(now.getDate()).padStart(2, '0');
            var hours = String(now.getHours()).padStart(2, '0');
            var minutes = String(now.getMinutes()).padStart(2, '0');
            var seconds = String(now.getSeconds()).padStart(2, '0');

            // 這裡維持您設定的 6 個 &nbsp; (對應顯示上的寬間距)
            var datePart = year + "/" + month + "/" + day;
            var timePart = hours + ":" + minutes + ":" + seconds;
            var separator = "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;";

            var timeString = "....... " + datePart + separator + timePart + " .......";

            document.getElementById('current-time').innerHTML = timeString;
        }

        // 2026年即時更新
        setInterval(updateClock, 1000);
        updateClock();
    </script>
