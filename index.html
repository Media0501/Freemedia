    <script>
        // 動態時鐘
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('current-date').textContent = `${year} / ${month} / ${day}`;
            document.getElementById('current-time').textContent = `${hours} : ${minutes} : ${seconds}`;
        }

        // 計數器邏輯 - 使用更穩定的 CounterAPI (counterapi.dev)
        // 初始值 1688，加上 API 回傳的累計次數
        function updateCounter() {
            const NAMESPACE = 'freeman0501';
            const KEY = 'freemedia';
            
            // 抓取次數並增加 (up 會讓數值 +1)
            fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/${KEY}/up`)
                .then(res => res.json())
                .then(res => {
                    const baseCount = 1688;
                    // CounterAPI 的回傳欄位為 count
                    const totalCount = baseCount + (res.count || 0);
                    const formattedCount = String(totalCount).padStart(6, '0');
                    document.getElementById('counter-number').textContent = formattedCount;
                })
                .catch(err => {
                    console.error('Counter error:', err);
                    document.getElementById('counter-number').textContent = '001688';
                });
        }

        setInterval(updateClock, 1000);
        updateClock();
        updateCounter();
    </script>
