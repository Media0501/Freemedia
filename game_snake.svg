<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#000;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <rect width="512" height="512" rx="100" fill="url(#bg)" />
    
    <!-- Grid -->
    <path d="M0,64 H512 M0,128 H512 M0,192 H512 M0,256 H512 M0,320 H512 M0,384 H512 M0,448 H512" stroke="#333" stroke-width="1" />
    <path d="M64,0 V512 M128,0 V512 M192,0 V512 M256,0 V512 M320,0 V512 M384,0 V512 M448,0 V512" stroke="#333" stroke-width="1" />
    
    <!-- Snake Body -->
    <path d="M128,320 H320 V192 H448" fill="none" stroke="#2ecc71" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
        <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="2s" repeatCount="indefinite" />
    </path>
    
    <!-- Snake Head -->
    <rect x="428" y="172" width="40" height="40" rx="10" fill="#2ecc71" filter="url(#glow)">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite" />
    </rect>
    
    <!-- Food -->
    <circle cx="448" cy="320" r="15" fill="#e74c3c" filter="url(#glow)">
        <animate attributeName="r" values="10;18;10" dur="0.8s" repeatCount="indefinite" />
    </circle>
</svg>
