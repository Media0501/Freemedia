<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="dogGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
        </linearGradient>
        <!-- 陰影濾鏡讓狗狗有立體感 -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="512" height="512" rx="100" fill="url(#bgGradient)" />

    <!-- Game Elements -->
    <g filter="url(#glow)">
        <!-- 洞口後方 -->
        <ellipse cx="256" cy="400" rx="150" ry="40" fill="#2d1c15" />
        
        <!-- 狗狗主體 (會隨著槌子打擊稍微震動) -->
        <g filter="url(#dropShadow)">
            <animateTransform attributeName="transform" type="translate" 
               values="0 0; 0 0; 0 15; 0 0; 0 0" 
               keyTimes="0; 0.1; 0.15; 0.3; 1" 
               dur="1.5s" repeatCount="indefinite" />

            <!-- 蓬鬆的毛髮與耳朵 -->
            <ellipse cx="140" cy="290" rx="60" ry="100" fill="url(#dogGradient)" transform="rotate(-20 140 290)"/>
            <ellipse cx="372" cy="290" rx="60" ry="100" fill="url(#dogGradient)" transform="rotate(20 372 290)"/>
            
            <!-- 臉頰毛髮 -->
            <circle cx="180" cy="330" r="50" fill="url(#dogGradient)" />
            <circle cx="332" cy="330" r="50" fill="url(#dogGradient)" />
            <circle cx="210" cy="360" r="45" fill="url(#dogGradient)" />
            <circle cx="302" cy="360" r="45" fill="url(#dogGradient)" />
            
            <!-- 大頭主體 -->
            <circle cx="256" cy="280" r="110" fill="url(#dogGradient)" />
            
            <!-- 超大無辜的眼睛 (參考瑪爾濟斯的特徵) -->
            <circle cx="200" cy="255" r="22" fill="#1a1a1a" />
            <circle cx="312" cy="255" r="22" fill="#1a1a1a" />
            
            <!-- 眼睛高光 -->
            <circle cx="192" cy="245" r="7" fill="#ffffff" />
            <circle cx="206" cy="265" r="3" fill="#ffffff" />
            <circle cx="304" cy="245" r="7" fill="#ffffff" />
            <circle cx="318" cy="265" r="3" fill="#ffffff" />
            
            <!-- 黑黑圓圓的鼻子 -->
            <ellipse cx="256" cy="305" rx="22" ry="16" fill="#1a1a1a" />
            <!-- 鼻子高光 -->
            <ellipse cx="250" cy="298" rx="6" ry="3" fill="#ffffff" opacity="0.6"/>
            
            <!-- 嘴巴與吐出來的小舌頭 -->
            <path d="M 230 325 Q 256 350 282 325" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round" fill="none" />
            <path d="M 242 335 Q 256 370 270 335 Z" fill="#ff6b81" />
            <path d="M 256 335 L 256 350" stroke="#d63031" stroke-width="2" />
            
            <!-- 頭頂粉紅可愛蝴蝶結 -->
            <g transform="translate(0, -10)">
                <path d="M 210 180 Q 256 220 256 240 Q 256 220 302 180 Q 270 140 256 160 Q 242 140 210 180" fill="#ff6b81" />
                <circle cx="256" cy="195" r="16" fill="#ff416c" />
            </g>
        </g>
        
        <!-- 洞口前方土壤 (用來營造狗狗在洞裡的感覺) -->
        <path d="M 106 400 A 150 40 0 0 0 406 400 L 406 430 A 150 40 0 0 1 106 430 Z" fill="#4a3424" />
        <path d="M 126 405 A 130 30 0 0 0 386 405 L 386 420 A 130 30 0 0 1 126 420 Z" fill="#362217" opacity="0.5"/>
        
        <!-- 動態打擊的槌子 -->
        <g transform="translate(420, 300)">
            <!-- 旋轉動畫，軸心設定在槌子末端 (0, 0) -->
            <animateTransform attributeName="transform" type="rotate" 
               values="30; -45; -50; 30; 30" 
               keyTimes="0; 0.1; 0.15; 0.5; 1" 
               dur="1.5s" repeatCount="indefinite" />
            
            <!-- 槌柄 -->
            <rect x="-12" y="-150" width="24" height="150" fill="#8b4513" rx="10" />
            <!-- 槌頭主體 -->
            <rect x="-45" y="-180" width="90" height="50" fill="#ff416c" rx="20" />
            <rect x="-55" y="-170" width="110" height="30" fill="#ff6b81" rx="15" />
            <!-- 高光 -->
            <rect x="-35" y="-175" width="70" height="8" fill="#ffffff" opacity="0.5" rx="4" />
        </g>

        <!-- 打擊瞬間的火花/特效 (配合槌子打擊的時間點) -->
        <g transform="translate(256, 180)">
            <animate attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.12; 0.15; 0.25; 1" dur="1.5s" repeatCount="indefinite" />
            <!-- 星星火花 -->
            <circle cx="0" cy="0" r="30" fill="#ffd200" opacity="0.8" filter="url(#glow)"/>
            <path d="M 0 -40 L 10 -15 L 40 0 L 10 15 L 0 40 L -10 15 L -40 0 L -10 -15 Z" fill="#ffffff" />
        </g>
    </g>
</svg>
