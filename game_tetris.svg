<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#141e30;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#243b55;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <rect width="512" height="512" rx="100" fill="url(#bg)" />
    
    <!-- Blocks (T-Shape) -->
    <g filter="url(#glow)">
        <rect x="200" y="300" width="112" height="36" rx="4" fill="#9b59b6" />
        <rect x="238" y="264" width="36" height="36" rx="4" fill="#9b59b6" />
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,100" dur="4s" repeatCount="indefinite" />
    </g>
    
    <!-- L-Shape Falling -->
    <g filter="url(#glow)">
        <rect x="100" y="100" width="36" height="112" rx="4" fill="#e67e22" />
        <rect x="136" y="176" width="36" height="36" rx="4" fill="#e67e22" />
        <animateTransform attributeName="transform" type="translate" values="0,-200; 0,300" dur="3s" repeatCount="indefinite" />
    </g>
    
    <!-- I-Shape Falling -->
    <g filter="url(#glow)">
        <rect x="350" y="50" width="36" height="150" rx="4" fill="#1abc9c" />
        <animateTransform attributeName="transform" type="translate" values="0,-150; 0,350" dur="2.5s" repeatCount="indefinite" />
    </g>

    <!-- O-Shape Static at bottom -->
    <g filter="url(#glow)">
        <rect x="330" y="380" width="80" height="80" rx="4" fill="#f1c40f" />
    </g>
</svg>
