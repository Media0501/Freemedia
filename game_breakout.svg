<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="brick1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ff4b2b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff416c;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="brick2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="brick3" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#f7971e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffd200;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="paddleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#bdc3c7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="512" height="512" rx="100" fill="url(#bgGradient)" />
    
    <!-- Bricks -->
    <!-- Row 1 -->
    <rect x="60" y="80" width="120" height="40" rx="8" fill="url(#brick1)" filter="url(#glow)" />
    <rect x="196" y="80" width="120" height="40" rx="8" fill="url(#brick1)" filter="url(#glow)" />
    <rect x="332" y="80" width="120" height="40" rx="8" fill="url(#brick1)" filter="url(#glow)" />
    
    <!-- Row 2 -->
    <rect x="60" y="130" width="120" height="40" rx="8" fill="url(#brick2)" filter="url(#glow)" />
    <rect x="196" y="130" width="120" height="40" rx="8" fill="url(#brick2)" filter="url(#glow)" />
    <rect x="332" y="130" width="120" height="40" rx="8" fill="url(#brick2)" filter="url(#glow)" />
    
    <!-- Row 3 -->
    <rect x="60" y="180" width="120" height="40" rx="8" fill="url(#brick3)" filter="url(#glow)" />
    <rect x="196" y="180" width="120" height="40" rx="8" fill="url(#brick3)" filter="url(#glow)" />
    <rect x="332" y="180" width="120" height="40" rx="8" fill="url(#brick3)" filter="url(#glow)" />
    
    <!-- Paddle -->
    <rect x="156" y="420" width="200" height="30" rx="15" fill="url(#paddleGrad)" filter="url(#glow)" />
    
    <!-- Ball -->
    <circle cx="256" cy="350" r="18" fill="white" filter="url(#glow)">
        <animate attributeName="cy" values="350;150;350" dur="3s" repeatCount="indefinite" />
        <animate attributeName="cx" values="256;150;356;256" dur="5s" repeatCount="indefinite" />
    </circle>
</svg>
