<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4568dc;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b06ab3;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="512" height="512" rx="100" fill="url(#bg)" />
    
    <!-- Cat Head Shape -->
    <path d="M256,150 L180,220 Q150,350 256,400 Q362,350 332,220 Z" fill="url(#catGrad)" filter="url(#glow)">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
    </path>
    <!-- Ears -->
    <path d="M180,220 L140,120 L220,185 Z" fill="url(#catGrad)" filter="url(#glow)" />
    <path d="M332,220 L372,120 L292,185 Z" fill="url(#catGrad)" filter="url(#glow)" />
    
    <!-- Eyes -->
    <circle cx="210" cy="280" r="15" fill="#2c3e50" />
    <circle cx="302" cy="280" r="15" fill="#2c3e50" />
    
    <!-- Star Shooter Effect -->
    <path d="M256,380 L270,410 L300,415 L275,435 L285,465 L256,445 L227,465 L237,435 L212,415 L242,410 Z" fill="white" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="0 256 422" to="360 256 422" dur="4s" repeatCount="indefinite" />
    </path>
</svg>
